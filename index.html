<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- CSSはここで読み込む -->
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="icon-1024.png">
    <title>多Lot</title>
</head>
<style>
  #result > div {
    width: 200px !important;
    height: 300px !important;
    opacity: 1 !important;
    color: #333 !important; /* 文字色を黒くする */
    background-color: #fff !important;
  }
</style>
<body>
    <div id="app">
        <h1>タロット占い</h1>

        <!-- 占い設定エリア -->
<div id="settings">
    <label>占い師タイプ: 
        <select id="persona">
            <option value="慈愛に満ちた">慈愛に満ちた</option>
            <option value="背中を押してくれる">背中を押してくれる</option>
            <option value="客観的で鋭い">客観的で鋭い</option>
            <option value="少し辛口な">少し辛口な</option>
        </select>
    </label>
    
    <label>カテゴリ: 
        <select id="category">
            <option value="メッセージ">メッセージ</option>
            <option value="仕事">仕事</option>
            <option value="恋愛">恋愛</option>
            <option value="人間関係">人間関係</option>
            <option value="子育て">子育て</option>
        </select>
    </label>
</div>
<br>
<!-- ボタンエリア（3枚引きなどの枚数で実行） -->
<button onclick="handleDraw()">1枚めくる</button>
<button onclick="requestAIEvaluation()" style="background-color: #27ae60; color: white;">この並びで占う</button>
<button onclick="resetCards()">カードをリセット</button>

<!-- 結果表示エリア -->
<div id="result"></div>
<!--<button id="ai-button" onclick="requestAIEvaluation()" style="background-color: #27ae60; color: white;">AIで占う</button>-->
<div id="ai-message-area"></div>
   <br>     
<!-- ボタンを追加 -->
<!-- index.htmlの該当箇所 -->
<button onclick="toggleHistory()">鑑定履歴を表示</button>

<!-- style="display: none;" を削除し、CSS側で制御します -->
<div id="history-area">
    <h2>過去の鑑定履歴</h2>
    <div id="history-list"></div>
</div>

<div id="history-modal" class="modal" style="display:none;">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <!-- ここに中身を流し込む箱を追加 -->
        <div id="modal-body"></div>
    </div>
</div>

    <!-- JSはbodyの最後に書く -->
    <script src="script.js"></script>
</body>
</html>
