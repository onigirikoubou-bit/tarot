<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- CSSはここで読み込む -->
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="icon-1024.png">
    <title>多Lot</title>
</head>
<body>
    <div id="app">
        <h1>タロット占い</h1>

        <!-- 占い設定エリア -->
<div id="settings">
    <label>占い師タイプ: 
        <select id="persona">
            <option value="慈愛に満ちた">慈愛に満ちた</option>
            <option value="背中を押してくれる">背中を押してくれる</option>
            <option value="客観的で鋭い">客観的で鋭い</option>
        </select>
    </label>
    
    <label>カテゴリ: 
        <select id="category">
            <option value="メッセージ">メッセージ</option>
            <option value="仕事">仕事</option>
            <option value="恋愛">恋愛</option>
            <option value="人間関係">人間関係</option>
            <option value="子育て">子育て</option>
        </select>
    </label>
</div>
<br>
<!-- ボタンエリア（3枚引きなどの枚数で実行） -->
<button onclick="handleDraw()">1枚めくる</button>

<!-- 結果表示エリア -->
<div id="result"></div>
<button id="ai-button" onclick="generateReading()">AIで占う</button>
<div id="ai-evaluation"></div>
        

    <!-- JSはbodyの最後に書く -->
    <script src="script.js"></script>
</body>
</html>
